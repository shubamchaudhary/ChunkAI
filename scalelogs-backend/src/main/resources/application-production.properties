# Server Configuration
server.port=${PORT:8080}
spring.application.name=scalelogs-ai

# Increase response size limits for large context windows and file uploads
server.tomcat.max-http-form-post-size=1GB
spring.codec.max-in-memory-size=1GB

# Database Configuration - Use environment variables from Render
# Parse DATABASE_URL or use individual components
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/deepdocai_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:deepdocai}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP Connection Pool Configuration
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.leak-detection-threshold=120000

# JPA Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false

# ─── LLM providers ────────────────────────────────────────────────────────────
scalelogs.llm.provider=${LLM_PROVIDER:groq}
scalelogs.llm.embedding-provider=${EMBEDDING_PROVIDER:gemini}
scalelogs.llm.rate-limit-utilization=0.80

# ─── Groq API ─────────────────────────────────────────────────────────────────
groq.api-key=${GROQ_API_KEY:}
groq.api-keys=${GROQ_API_KEYS:}
groq.base-url=https://api.groq.com/openai/v1
groq.chat-model=llama-3.1-8b-instant
groq.embedding-model=nomic-embed-text-v1_5
groq.max-output-tokens=1024
groq.max-retries=3
groq.rate-limit-per-min=30
groq.tpm-limit=6000

# Gemini API Configuration - Use environment variables
gemini.api-key=${GEMINI_API_KEY:}
gemini.api-keys=${GEMINI_API_KEYS}
gemini.embedding-model=gemini-embedding-001
gemini.embedding-dimensions=768
gemini.generation-model=gemini-2.5-flash
gemini.base-url=https://generativelanguage.googleapis.com/v1beta
gemini.max-retries=3
gemini.timeout-seconds=60
gemini.rate-limit-retry-delay-ms=5000
gemini.max-output-tokens=8192
gemini.max-context-chunks=150
gemini.max-conversation-history=50

scalelogs.gemini.rate-limit-per-min=10
scalelogs.gemini.rate-limit-utilization=0.80
scalelogs.gemini.context-limit-tokens=1000000
scalelogs.gemini.max-output-tokens=8192

# ─── RAG / Embedding pipeline ─────────────────────────────────────────────────
scalelogs.embedding.batch-size=80
scalelogs.embedding.enabled=true
scalelogs.rag.max-retrieved-chunks=500
scalelogs.rag.utilization=0.80

# ─── Kafka / MinIO / orchestrator — MUST be set via env vars on Render ────────
# These have NO safe default on a hosted platform; they must point at your
# externally-hosted Kafka broker, MinIO/S3-compatible store, and orchestrator.
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.acks=all
spring.kafka.producer.properties.enable.idempotence=true
spring.kafka.producer.properties.spring.json.add.type.headers=false
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.enable-auto-commit=false
spring.kafka.listener.ack-mode=MANUAL
scalelogs.window-seconds=60
scalelogs.enrich.max-content-chars=5000
scalelogs.minio.endpoint=${MINIO_ENDPOINT}
scalelogs.minio.access-key=${MINIO_ACCESS_KEY}
scalelogs.minio.secret-key=${MINIO_SECRET_KEY}
scalelogs.minio.bucket=${MINIO_BUCKET:staging}
scalelogs.orchestrator.url=${ORCHESTRATOR_URL}

# ─── Guest / demo mode ────────────────────────────────────────────────────────
scalelogs.guest.session-id=${GUEST_SESSION_ID:}
scalelogs.guest.email=guest@scalelogs.demo

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=1GB
spring.servlet.multipart.max-request-size=2GB
spring.servlet.multipart.file-size-threshold=2MB

# File Storage Configuration - Use temp directory in production
file.storage.directory=${TMPDIR:/tmp}/uploads

# Logging
logging.level.com.scalelogs=INFO
logging.level.org.springframework.security=WARN

